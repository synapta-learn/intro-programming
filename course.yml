name: Introduction to Programming
description: >
  A comprehensive introduction to programming using Java. Starting from absolute zero,
  this course takes you through the fundamentals of programming — variables, control flow,
  methods, arrays — all the way to object-oriented programming with classes, inheritance,
  and polymorphism. Each lecture builds on the previous one, with hands-on exercises
  that reinforce every concept.

lectures:
